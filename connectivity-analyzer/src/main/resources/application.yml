spring:
  application:
    name: smart-oilfield-connectivity-analyzer
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_oilfield}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: ConnectivityAnalyzerHikariPool
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8081
  servlet:
    context-path: /api

advanced:
  connectivity:
    default-analysis-window-days: 30
    min-analysis-window-days: 7
    significance-threshold: 0.5
    max-time-lag-hours: 168
    strong-connectivity-threshold: 0.8
    moderate-connectivity-threshold: 0.5
    weak-connectivity-threshold: 0.3
    min-data-quality-threshold: 0.6
    auto-analysis-schedule: "0 0 3 * * ?"
    enable-graph-model-screening: true
    max-conditioning-variables: 3
    partial-correlation-threshold: 0.3
    spurious-edge-threshold: 0.15

logging:
  level:
    com.smart.oilfield.connectivity: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
