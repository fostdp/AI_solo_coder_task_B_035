spring:
  application:
    name: smart-oilfield-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_oilfield}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:50}
      minimum-idle: ${DB_POOL_MIN:10}
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: SmartOilfieldHikariPool
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,heapdump,threaddump
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    metrics:
      export:
        prometheus:
          enabled: true
          step: 30s
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      all: true
    export:
      simple:
        enabled: false

mqtt:
  broker: ${MQTT_BROKER:tcp://localhost:1883}
  client-id: smart-oilfield-backend
  username: ${MQTT_USER:admin}
  password: ${MQTT_PASSWORD:admin}
  alarm-topic: oilfield/alarms
  allocation-topic: oilfield/allocation
  data-topic: oilfield/data/+
  message-expiry-seconds: 300
  max-offline-messages: 1000
  max-retry-attempts: 3
  flush-interval-ms: 10000

waterflood:
  history:
    days: 30
    min-regression-days: 7
  allocation:
    max-water-increase-rate: 0.2
    max-water-decrease-rate: 0.3
    min-adjustment-rate: 0.02
    min-water-volume: 10.0
    simplex-threshold: 50
    max-subproblem-size: 40
    max-iterations: 100
    convergence-threshold: 0.000001
    initial-step-size: 0.01
    step-decay-rate: 0.99
    min-step-size: 0.0001
  curve:
    default-slope: 0.015
    default-intercept: 0.0
    default-water-cut-rate: 0.001
    oil-gain-multiplier: 1000.0
    water-cut-penalty-multiplier: 500.0
  effectiveness:
    high-threshold: 0.7
    medium-threshold: 0.4
    default-value: 0.5

scheduling:
  enabled: true

allocation:
  schedule: "0 0 2 * * ?"
  days-interval: 7
  model-version: "1.0.0"

alarm:
  water-cut-rise-threshold: 5.0
  pressure-threshold-ratio: 0.8
  check-schedule: "0 0 1 * * ?"

logging:
  level:
    com.smart.oilfield: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
