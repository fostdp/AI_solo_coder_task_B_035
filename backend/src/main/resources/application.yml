spring:
  application:
    name: smart-oilfield-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_oilfield
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: SmartOilfieldHikariPool
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8080
  servlet:
    context-path: /api

mqtt:
  broker: tcp://localhost:1883
  client-id: smart-oilfield-backend
  username: admin
  password: admin
  alarm-topic: oilfield/alarms
  data-topic: oilfield/data/+
  message-expiry-seconds: 300
  max-offline-messages: 1000
  max-retry-attempts: 3
  flush-interval-ms: 10000

allocation:
  schedule: "0 0 2 * * ?"
  days-interval: 7
  model-version: "1.0.0"

alarm:
  water-cut-rise-threshold: 5.0
  pressure-threshold-ratio: 0.8
  check-schedule: "0 0 1 * * ?"

logging:
  level:
    com.smart.oilfield: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
