spring:
  application:
    name: smart-oilfield-eor-evaluator
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_oilfield}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: EOREvaluatorHikariPool
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8083

advanced:
  eor:
    default-prediction-horizon-months: 24
    default-oil-price-per-barrel: 70.0
    default-discount-rate: 0.08
    min-roi-threshold: 15.0
    min-technical-feasibility: 0.6
    polymer-default-concentration: 1500.0
    surfactant-default-concentration: 300.0
    polymer-default-slug-size: 0.5
    surfactant-default-slug-size: 0.3
    polymer-default-injection-rate: 500.0
    surfactant-default-injection-rate: 300.0
    polymer-oil-increment-factor: 0.15
    surfactant-oil-increment-factor: 0.25
    combined-oil-increment-factor: 0.35
    polymer-water-cut-reduction: 10.0
    surfactant-water-cut-reduction: 15.0
    combined-water-cut-reduction: 20.0
    polymer-cost-per-ton: 15000
    surfactant-cost-per-ton: 25000
    auto-evaluation-days-interval: 30
    auto-evaluation-schedule: "0 0 5 * * ?"
    model-version: "v2.0"
    enable-history-matching: true
    history-matching-window-months: 12
    history-matching-tolerance: 0.05
    max-optimization-iterations: 100
    optimization-learning-rate: 0.01
    parameter-adjustment-factor: 0.8
    min-history-data-points: 6
    maximum-allowable-deviation: 0.15

logging:
  level:
    com.smart.oilfield.eor: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
